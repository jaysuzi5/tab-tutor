# Tab Tutor secrets — DO NOT commit a plaintext Secret. Seal it with kubeseal.
# DB credentials are NOT here — CloudNativePG manages them in `tab-tutor-db-app`.
#
# Generate the real SealedSecret (creates a dedicated Groq key first!):
#
#   kubectl create secret generic tab-tutor-secrets \
#     --namespace tab-tutor \
#     --from-literal=GROQ_API_KEY='gsk_...' \
#     --from-literal=SPOTIFY_CLIENT_ID='...' \
#     --from-literal=SPOTIFY_CLIENT_SECRET='...' \
#     --dry-run=client -o yaml \
#     | kubeseal --format yaml > charts/tab-tutor/templates/sealedsecret.yaml
#
# Then commit charts/tab-tutor/templates/sealedsecret.yaml (the sealed, safe
# version). Treat any key ever committed in plaintext as compromised — rotate it.
#
# Spotify keys are optional (only if config.spotifyEnabled=true).
apiVersion: v1
kind: Secret
metadata:
  name: tab-tutor-secrets
  namespace: tab-tutor
type: Opaque
stringData:
  GROQ_API_KEY: "REPLACE_ME"
  SPOTIFY_CLIENT_ID: "REPLACE_ME_OR_OMIT"
  SPOTIFY_CLIENT_SECRET: "REPLACE_ME_OR_OMIT"
