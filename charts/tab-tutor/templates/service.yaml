apiVersion: v1
kind: Service
metadata:
  name: tab-tutor
  labels:
    {{- include "tab-tutor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tab-tutor.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
