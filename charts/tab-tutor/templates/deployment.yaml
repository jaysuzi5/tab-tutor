apiVersion: apps/v1
kind: Deployment
metadata:
  name: tab-tutor
  labels:
    {{- include "tab-tutor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tab-tutor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tab-tutor.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: tab-tutor-config
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: GROQ_API_KEY
                  optional: true
            - name: SPOTIFY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: SPOTIFY_CLIENT_ID
                  optional: true
            - name: SPOTIFY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: SPOTIFY_CLIENT_SECRET
                  optional: true
            {{- if .Values.postgres.enabled }}
            # CloudNativePG publishes a ready-made connection URI in the -app secret.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tab-tutor-db-app
                  key: uri
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
